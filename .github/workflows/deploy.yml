name: Deploy
on:
  push:
    branches: ["main"]
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 22

      - run: npm ci

      - run: npm run build
        env:
          VITE_SUPABASE_URL: https://dvqukegdkwdbnyecnved.supabase.co
          VITE_SUPABASE_ANON_KEY: sb_publishable_Qk9KjAJlWeEnQKY54Ad9JQ_QSCJOL6D
          VITE_BASE_URL: /gerenzhan/

      - name: Deploy to gh-pages branch
        uses: peaceiris/actions-gh-pages@v4
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}
          publish_dir: ./dist
          publish_branch: gh-pages
          force_orphan: true
